<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A &amp; N</title>
    <link rel="stylesheet" href="shared/space-bg.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Space background -->
    <div class="stars-container" id="starsContainer"></div>
    <div id="space-dust"></div>
    <div id="planet-layer"></div>
    <div id="asteroid-belt"></div>

    <!-- Lily bloom overlay (triggered when opening Arsh's letters) -->
    <div id="lilyOverlay" class="lily-overlay" aria-hidden="true">
        <div class="lily-center">
            <div class="lily-petal" style="--angle: 0deg"></div>
            <div class="lily-petal" style="--angle: 60deg"></div>
            <div class="lily-petal" style="--angle: 120deg"></div>
            <div class="lily-petal" style="--angle: 180deg"></div>
            <div class="lily-petal" style="--angle: 240deg"></div>
            <div class="lily-petal" style="--angle: 300deg"></div>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-icons">
            <span class="hero-icon">🚀</span>
            <span class="hero-icon lily-delay">🪷</span>
        </div>
        <h1 class="hero-title">The Universe aligned...</h1>
        <div class="counter-box">
            <div class="time-units">
                <div class="time-unit">
                    <span id="days">0</span>
                    <small>days</small>
                </div>
                <div class="time-unit">
                    <span id="hours">0</span>
                    <small>hours</small>
                </div>
                <div class="time-unit">
                    <span id="mins">0</span>
                    <small>mins</small>
                </div>
                <div class="time-unit">
                    <span id="secs">0</span>
                    <small>secs</small>
                </div>
            </div>
            <p class="counter-sub">ago and counting!</p>
        </div>
        <div class="scroll-hint">↓</div>
    </section>

    <!-- Letters -->
    <section class="letters-section">
        <h2 class="letters-heading">Letters</h2>
        <div class="letter-carousel" id="letterCarousel"></div>
    </section>

    <script src="shared/space-bg.js"></script>
    <script src="letters.js"></script>
    <script src="script.js"></script>
</body>
</html>
